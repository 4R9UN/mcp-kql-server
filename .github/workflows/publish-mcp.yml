name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]  # Triggers on version tags like v2.0.8
  workflow_dispatch:  # Allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MCP Publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Login to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        # Treat "cannot publish duplicate version" as a successful no-op so
        # workflow re-runs (or pushing the same tag again) don't fail the job.
        # Real failures (auth, schema, network) still surface as exit != 0.
        run: |
          set +e
          OUT=$(./mcp-publisher publish 2>&1)
          STATUS=$?
          echo "$OUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUT" | grep -qi "duplicate version"; then
              echo "::notice::Version already published to MCP Registry; treating as success."
              exit 0
            fi
            exit $STATUS
          fi
